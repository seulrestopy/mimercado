<style>
:root {
  --bg: #F0F3F7;
  --surface: #FFFFFF;
  --surface2: #F7F9FB;
  --border: #E2E8F0;
  --primary: #1F4E79;
  --primary-light: #2D6FA3;
  --accent: #E67E22;
  --text: #1A2535;
  --text2: #5A6A7E;
  --text3: #9AABB8;
  --green: #21863D;
  --red: #C0392B;
  --yellow: #F39C12;
  --radius: 12px;
  --shadow: 0 2px 12px rgba(0,0,0,0.07);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Segoe UI', Arial, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

/* ── NAV ── */
.nav { background: var(--primary); color: white; padding: 0 24px; display: flex; align-items: center; box-shadow: 0 2px 8px rgba(0,0,0,0.2); position: sticky; top: 0; z-index: 100; }
.nav-logo { font-size: 18px; font-weight: 800; letter-spacing: -0.5px; padding: 16px 20px 16px 0; border-right: 1px solid rgba(255,255,255,0.2); margin-right: 8px; white-space: nowrap; }
.nav-logo span { color: #F5C842; }
.nav-tabs { display: flex; flex: 1; }
.nav-tab { padding: 18px 20px; font-size: 13px; font-weight: 600; color: rgba(255,255,255,0.65); cursor: pointer; border-bottom: 3px solid transparent; transition: all .18s; white-space: nowrap; }
.nav-tab:hover { color: white; background: rgba(255,255,255,0.07); }
.nav-tab.active { color: white; border-bottom-color: #F5C842; }

/* ── LAYOUT ── */
.page { display: none; padding: 28px 24px; max-width: 1100px; margin: 0 auto; }
.page.active { display: block; }

/* ── CARDS ── */
.card { background: var(--surface); border-radius: var(--radius); box-shadow: var(--shadow); border: 1px solid var(--border); margin-bottom: 18px; overflow: hidden; }
.card-head { padding: 14px 20px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; gap: 12px; flex-wrap: wrap; }
.card-title { font-size: 13px; font-weight: 700; color: var(--primary); text-transform: uppercase; letter-spacing: 0.5px; }

/* ── STORE SECTION ── */
.store-block { margin-bottom: 24px; }
.store-hdr { display: flex; align-items: center; justify-content: space-between; padding: 9px 14px; border-radius: 8px 8px 0 0; color: white; font-size: 13px; font-weight: 700; }
.store-hdr .store-sub { font-size: 12px; font-weight: 600; opacity: 0.9; }
.store-rows { border: 1px solid var(--border); border-top: none; border-radius: 0 0 8px 8px; overflow: hidden; }
.item-row { display: grid; grid-template-columns: 1fr 70px 130px 100px; align-items: center; padding: 8px 14px; border-bottom: 1px solid #F0F4F8; transition: background .1s; }
.item-row:last-child { border-bottom: none; }
.item-row:hover { background: #F7FAFD; }
.item-name { font-size: 13px; font-weight: 500; }
.item-unit { font-size: 11px; color: var(--text3); text-align: center; }
.qty-wrap { display: flex; align-items: center; justify-content: center; gap: 6px; }
.qty-btn { width: 26px; height: 26px; border: 1.5px solid var(--border); background: var(--surface2); border-radius: 6px; font-size: 16px; cursor: pointer; display: flex; align-items: center; justify-content: center; color: var(--text2); transition: all .15s; line-height: 1; }
.qty-btn:hover { border-color: var(--primary-light); color: var(--primary); background: #EEF4FB; }
.qty-input { width: 46px; text-align: center; border: 1.5px solid var(--border); border-radius: 6px; padding: 4px; font-size: 14px; font-weight: 700; color: var(--primary); outline: none; }
.qty-input:focus { border-color: var(--primary-light); }
.qty-input.changed { border-color: var(--accent); color: var(--accent); background: #FEF6EE; }
.item-sub { text-align: right; font-size: 12px; color: var(--text2); }

/* ── SUMMARY BAR ── */
.summary-bar { position: sticky; bottom: 0; background: var(--primary); color: white; padding: 14px 24px; display: flex; align-items: center; justify-content: space-between; box-shadow: 0 -4px 16px rgba(0,0,0,0.15); z-index: 50; gap: 14px; flex-wrap: wrap; }
.summary-total { font-size: 18px; font-weight: 800; }
.summary-label { font-size: 12px; opacity: 0.7; margin-bottom: 2px; }
.summary-actions { display: flex; gap: 8px; flex-wrap: wrap; }
.btn { padding: 10px 18px; border-radius: 8px; border: none; font-size: 13px; font-weight: 700; cursor: pointer; transition: all .15s; display: inline-flex; align-items: center; gap: 7px; font-family: inherit; }
.btn:active { transform: scale(0.97); }
.btn-primary { background: #F5C842; color: #1A2535; }
.btn-primary:hover { background: #F0BE30; }
.btn-ghost { background: rgba(255,255,255,0.15); color: white; border: 1px solid rgba(255,255,255,0.3); }
.btn-ghost:hover { background: rgba(255,255,255,0.25); }
.btn-outline { background: white; color: var(--primary); border: 1.5px solid var(--border); }
.btn-outline:hover { border-color: var(--primary-light); background: #F4F8FC; }
.btn-green { background: var(--green); color: white; }
.btn-green:hover { background: #1a6e31; }
.btn-red { background: var(--red); color: white; }
.btn-sm { padding: 6px 12px; font-size: 12px; }

/* ── DATE ROW ── */
.date-row { display: flex; align-items: center; gap: 12px; margin-bottom: 20px; flex-wrap: wrap; }
.date-row label { font-size: 13px; font-weight: 700; color: var(--text2); }
.date-input, .form-input, .form-select { border: 1.5px solid var(--border); border-radius: 8px; padding: 8px 14px; font-size: 14px; color: var(--text); outline: none; transition: border-color .15s; font-family: inherit; background: white; }
.date-input:focus, .form-input:focus, .form-select:focus { border-color: var(--primary-light); }

/* ── TABLES ── */
.hist-table, .master-table { width: 100%; border-collapse: collapse; font-size: 13px; }
.hist-table th, .master-table th { background: var(--surface2); padding: 10px 14px; text-align: left; font-size: 11px; font-weight: 700; color: var(--text2); text-transform: uppercase; letter-spacing: 0.4px; border-bottom: 2px solid var(--border); }
.hist-table td, .master-table td { padding: 9px 14px; border-bottom: 1px solid var(--border); vertical-align: middle; }
.hist-table tr:hover td, .master-table tr:hover td { background: var(--surface2); }
.price-up { color: var(--red); font-weight: 600; font-size: 12px; }
.price-down { color: var(--green); font-weight: 600; font-size: 12px; }
.price-same { color: var(--text3); font-size: 12px; }
.week-total { font-weight: 700; color: var(--primary); }

/* ── STATS ── */
.stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 14px; margin-bottom: 20px; }
.stat-card { background: white; border: 1px solid var(--border); border-radius: var(--radius); padding: 16px; }
.stat-label { font-size: 11px; font-weight: 700; color: var(--text3); text-transform: uppercase; letter-spacing: 0.4px; margin-bottom: 6px; }
.stat-value { font-size: 22px; font-weight: 800; color: var(--primary); }
.stat-sub { font-size: 11px; color: var(--text3); margin-top: 3px; }

/* ── CHART ── */
.chart-wrap { padding: 16px 20px; }
.bar-row { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
.bar-label { width: 110px; font-size: 12px; color: var(--text2); text-align: right; flex-shrink: 0; }
.bar-track { flex: 1; background: #EEF2F7; border-radius: 4px; height: 20px; overflow: hidden; }
.bar-fill { height: 100%; border-radius: 4px; display: flex; align-items: center; padding-left: 8px; background: var(--primary); }
.bar-val { font-size: 11px; font-weight: 700; color: white; white-space: nowrap; }

/* ── PRODUCT MANAGEMENT ── */
.prod-toolbar { display: flex; gap: 10px; margin-bottom: 16px; flex-wrap: wrap; align-items: center; }
.search-input { flex: 1; min-width: 200px; }
.prod-row-actions { display: flex; gap: 6px; }
.icon-btn { width: 30px; height: 30px; border: 1.5px solid var(--border); background: white; border-radius: 7px; cursor: pointer; display: inline-flex; align-items: center; justify-content: center; font-size: 14px; transition: all .15s; }
.icon-btn:hover { border-color: var(--primary-light); background: #F4F8FC; }
.icon-btn.del:hover { border-color: var(--red); background: #FDF0EF; }
.icon-btn:disabled { opacity: 0.25; cursor: not-allowed; pointer-events: none; }

/* ── EMPTY ── */
.empty { text-align: center; padding: 48px 20px; color: var(--text3); }
.empty-icon { font-size: 40px; margin-bottom: 12px; }
.empty-text { font-size: 15px; font-weight: 600; color: var(--text2); margin-bottom: 6px; }

/* ── MODAL ── */
.modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.45); z-index: 200; align-items: center; justify-content: center; padding: 20px; }
.modal-overlay.open { display: flex; }
.modal { background: white; border-radius: 16px; padding: 28px; max-width: 460px; width: 100%; box-shadow: 0 20px 60px rgba(0,0,0,0.2); max-height: 90vh; overflow-y: auto; }
.modal h3 { font-size: 17px; font-weight: 800; margin-bottom: 18px; }
.form-group { margin-bottom: 14px; }
.form-group label { display: block; font-size: 12px; font-weight: 700; color: var(--text2); margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.3px; }
.form-group .form-input, .form-group .form-select { width: 100%; }
.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.modal-actions { display: flex; gap: 10px; justify-content: flex-end; margin-top: 22px; }

/* ── TOAST ── */
.toast { position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%) translateY(20px); background: #1A2535; color: white; padding: 12px 22px; border-radius: 24px; font-size: 13px; font-weight: 600; opacity: 0; transition: all .3s; z-index: 300; white-space: nowrap; pointer-events: none; }
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

/* ── PRINT VIEW ── */
#printArea { display: none; }
@media print {
  body * { visibility: hidden; }
  #printArea, #printArea * { visibility: visible; }
  #printArea { display: block !important; position: absolute; left: 0; top: 0; width: 100%; }
  @page { size: A4 landscape; margin: 8mm 10mm; }
}
.print-sheet { font-family: Arial, sans-serif; color: #000; background: white; padding: 0; }
.print-title { font-size: 16px; font-weight: 800; padding: 4px 0 2px; border-bottom: 2.5px solid #1F4E79; margin-bottom: 2px; display: flex; justify-content: space-between; align-items: baseline; }
.print-total { font-size: 12px; font-weight: 700; color: #1F4E79; }
.print-legend { font-size: 8.5px; color: #555; margin-bottom: 6px; display: flex; gap: 16px; }
.print-cols { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 0 14px; align-items: start; }
.print-col { display: flex; flex-direction: column; gap: 0; }
.print-store-block { margin-bottom: 6px; break-inside: avoid; }
.print-store-hdr { font-size: 10px; font-weight: 800; color: white; padding: 2.5px 7px; margin: 5px 0 2px; border-radius: 3px; }
.print-item { display: grid; grid-template-columns: 13px 16px 1fr 52px 13px; align-items: center; gap: 4px; padding: 1.5px 0; font-size: 9.5px; border-bottom: 0.5px dotted #ccc; }
.print-chk { width: 11px; height: 11px; border: 1.2px solid #444; border-radius: 2px; display: inline-block; }
.print-num { color: #888; font-size: 8.5px; text-align: right; }
.print-pname { font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.print-pqty { text-align: right; font-size: 9px; color: #333; white-space: nowrap; }
.print-foot { margin-top: 8px; font-size: 8.5px; color: #666; display: flex; justify-content: space-between; border-top: 1px solid #999; padding-top: 4px; }

@media (max-width: 640px) {
  .nav-tab { padding: 16px 12px; font-size: 12px; }
  .page { padding: 16px 14px; }
  .item-row { grid-template-columns: 1fr 55px 110px; }
  .item-sub { display: none; }
  .form-row { grid-template-columns: 1fr; }
}

/* ── iOS 홈화면 앱 모드 ── */
@supports (-webkit-touch-callout: none) {
  body { padding-top: env(safe-area-inset-top); }
  .nav { padding-top: calc(env(safe-area-inset-top) + 0px); position: fixed; top: 0; left: 0; right: 0; }
  .page { padding-top: calc(env(safe-area-inset-top) + 72px); }
  .summary-bar { padding-bottom: calc(env(safe-area-inset-bottom) + 14px); }
}
</style>

let master = {};
let thisWeek = {};
let history = [];

function loadState() {
  try {
    const m = localStorage.getItem('mercadoMaster');
    master = m ? JSON.parse(m) : JSON.parse(JSON.stringify(INITIAL_MASTER));
    const h = localStorage.getItem('mercadoHistory');
    history = h ? JSON.parse(h) : [];
    if (master['음료']) { master['Bebidas'] = master['음료']; delete master['음료']; }
  } catch(e) {
    master = JSON.parse(JSON.stringify(INITIAL_MASTER));
    history = [];
  }
  sortAllStores();
  initThisWeek();
  // ── 자동저장된 이번주 수량 복원 ──
  try {
    const sw = localStorage.getItem('mercadoThisWeek');
    if (sw) {
      const saved = JSON.parse(sw);
      for (const store of getStores()) {
        if (!saved[store] || !thisWeek[store]) continue;
        saved[store].forEach((item, idx) => {
          if (thisWeek[store][idx] && item.name === thisWeek[store][idx].name) {
            thisWeek[store][idx].qty = item.qty;
          }
        });
      }
    }
    const savedDate = localStorage.getItem('mercadoThisWeekDate');
    if (savedDate) setTimeout(() => {
      const el = document.getElementById('purchaseDate');
      if (el) el.value = savedDate;
    }, 0);
  } catch(e) {}
}

function saveState() {
  localStorage.setItem('mercadoMaster', JSON.stringify(master));
  localStorage.setItem('mercadoHistory', JSON.stringify(history));
}

function saveThisWeek() {
  localStorage.setItem('mercadoThisWeek', JSON.stringify(thisWeek));
  const dateEl = document.getElementById('purchaseDate');
  if (dateEl) localStorage.setItem('mercadoThisWeekDate', dateEl.value);
  flashSaveBadge();
}

function initThisWeek() {
  thisWeek = {};
  for (const store of getStores()) {
    if (!master[store]) continue;
    thisWeek[store] = master[store].map(p => ({ name:p.name, unit:p.unit, qty:0, price:p.price }));
  }
}

function renderInput() {
  const container = document.getElementById('storeBlocks');
  container.innerHTML = '';
  for (const store of getStores()) {
    if (!thisWeek[store] || !thisWeek[store].length) continue;
    const color = getStoreColor(store);
    const key = storeKey(store);
    const storeSub = thisWeek[store].reduce((s,p)=>s+p.qty*p.price,0);
    const block = document.createElement('div');
    block.className = 'store-block';
    block.innerHTML = `
      <div class="store-hdr" style="background:${color}">
        <span>${store}</span>
        <span class="store-sub" id="sub-${key}">₲ ${fmt(storeSub)}</span>
      </div>
      <div class="store-rows" id="rows-${key}"></div>`;
    container.appendChild(block);
    renderStoreRows(store);
  }
  updateTotal();
}

function renderStoreRows(store) {
  const key = storeKey(store);
  const container = document.getElementById('rows-'+key);
  if (!container) return;
  container.innerHTML = '';
  const items = thisWeek[store];
  const masterItems = master[store] || [];
  items.forEach((p, idx) => {
    const mi = masterItems[idx] || {};
    const div = document.createElement('div');
    div.className = 'item-row';
    div.innerHTML = `
      <div class="item-name">${p.name}</div>
      <div class="item-unit">${p.unit}</div>
      <div class="qty-wrap">
        <button class="qty-btn" onclick="adjustQty('${store}',${idx},-1)">−</button>
        <input class="qty-input ${p.qty !== mi.qty ? 'changed' : ''}" type="number" min="0" value="${p.qty}"
               id="qty-${key}-${idx}" onchange="setQty('${store}',${idx},this.value)">
        <button class="qty-btn" onclick="adjustQty('${store}',${idx},+1)">+</button>
      </div>
      <div class="item-sub" id="isub-${key}-${idx}">₲ ${fmt(p.qty*p.price)}</div>`;
    container.appendChild(div);
  });
}

function adjustQty(store, idx, delta) {
  thisWeek[store][idx].qty = Math.max(0, (thisWeek[store][idx].qty||0) + delta);
  updateRowUI(store, idx);
  saveThisWeek();
}
function setQty(store, idx, val) {
  thisWeek[store][idx].qty = Math.max(0, parseInt(val)||0);
  updateRowUI(store, idx);
  saveThisWeek();
}
function updateRowUI(store, idx) {
  const key = storeKey(store);
  const p = thisWeek[store][idx];
  const mi = (master[store]||[])[idx] || {};
  const inp = document.getElementById(`qty-${key}-${idx}`);
  const sub = document.getElementById(`isub-${key}-${idx}`);
  if (inp) { inp.value = p.qty; inp.className = 'qty-input ' + (p.qty !== mi.qty ? 'changed' : ''); }
  if (sub) sub.textContent = '₲ ' + fmt(p.qty * p.price);
  const storeSub = thisWeek[store].reduce((s,x)=>s+x.qty*x.price,0);
  const subEl = document.getElementById('sub-'+key);
  if (subEl) subEl.textContent = '₲ ' + fmt(storeSub);
  updateTotal();
}
function updateTotal() {
  let total = 0;
  for (const store of getStores()) {
    if (!thisWeek[store]) continue;
    total += thisWeek[store].reduce((s,p)=>s+p.qty*p.price,0);
  }
  document.getElementById('summaryTotal').textContent = '₲ ' + fmt(total);
}
function flashSaveBadge() {
  const el = document.getElementById('autosaveBadge');
  if (!el) return;
  const now = new Date();
  el.textContent = '💾 guardado ' + now.getHours().toString().padStart(2,'0') + ':' + now.getMinutes().toString().padStart(2,'0');
  el.style.color = 'var(--green)';
  setTimeout(() => { el.style.color = 'var(--text3)'; }, 2000);
}
function resetQty() {
  initThisWeek();
  saveThisWeek();
  renderInput();
  showToast('Cantidades restauradas');
}

//  COMPLETAR — 이력 저장 + 엑셀
// ════════════════════════════════════════════════════════════
function gatherWeek() {
  const allItems = [];
  const totals = {};
  let total = 0;
  for (const store of getStores()) {
    if (!thisWeek[store]) continue;
    for (const p of thisWeek[store]) {
      if (p.qty > 0) {
        allItems.push({ store, name: p.name, unit: p.unit, qty: p.qty, price: p.price });
        const amt = p.qty * p.price;
        const grp = STORE_GROUP[store] || 'Otros';
        totals[grp] = (totals[grp]||0) + amt;
        total += amt;
      }
    }
  }
  return { allItems, totals, total };
}

function completeWeek() {
  const dateVal = document.getElementById('purchaseDate').value;
  if (!dateVal) { showToast('⚠️ Ingrese la fecha primero'); return; }
  const { allItems, totals, total } = gatherWeek();
  if (!allItems.length) { showToast('⚠️ No hay productos con cantidad'); return; }

  const exists = history.find(h => h.date === dateVal);
  if (exists) {
    showModal('Fecha ya registrada',
      `<p style="color:var(--text2);font-size:14px;line-height:1.7">Ya existe un registro para ${dateVal}.<br>¿Desea sobrescribirlo?</p>`,
      [
        {label:'Cancelar', cls:'btn-outline', fn: closeModal},
        {label:'Sobrescribir', cls:'btn-red', fn: ()=>{ history = history.filter(h=>h.date!==dateVal); doSave(dateVal,allItems,totals,total); closeModal(); }}
      ]);
    return;
  }
  doSave(dateVal, allItems, totals, total);
}

function doSave(dateVal, allItems, totals, total) {
  history.unshift({ date: dateVal, items: allItems, totals, total });
  saveState();
  localStorage.removeItem('mercadoThisWeek');
  localStorage.removeItem('mercadoThisWeekDate');
  generateExcel(dateVal, allItems, total);
  showToast('✅ Guardado. Descargando Excel...');
  initThisWeek();
  renderInput();
}

// ════════════════════════════════════════════════════════════
//  EXCEL — A4 가로 한 장, 3컬럼, 체크박스 앞뒤
// ════════════════════════════════════════════════════════════
function buildColumns(allItems) {
  // 거래처별 블록 생성
  const blocks = [];
  let num = 0;
  let curStore = '';
  let curBlock = null;
  for (const it of allItems) {
    if (it.store !== curStore) {
      if (curBlock) blocks.push(curBlock);
      curBlock = { store: it.store, items: [] };
      curStore = it.store;
    }
    num++;
    curBlock.items.push({ num, name: it.name, qtyStr: `${it.qty} ${it.unit}` });
  }
  if (curBlock) blocks.push(curBlock);

  // Masonry: 3컬럼 greedy — 항상 가장 짧은 컬럼에 블록 배치
  const NUM_COLS = 3;
  const cols = Array.from({length: NUM_COLS}, () => ({ height: 0, blocks: [] }));
  for (const block of blocks) {
    const blockH = 1 + block.items.length;
    let minIdx = 0;
    for (let i = 1; i < NUM_COLS; i++) {
      if (cols[i].height < cols[minIdx].height) minIdx = i;
    }
    cols[minIdx].blocks.push(block);
    cols[minIdx].height += blockH + 0.5;
  }
  return cols.map(c => c.blocks);
}

function generateExcel(dateVal, allItems, total) {
  const wb = XLSX.utils.book_new();
  const cols = buildColumns(allItems); // cols[i] = [{store, items:[{num,name,qtyStr}]}]

  // 각 컬럼을 행 배열로 평탄화
  const flatCols = cols.map(colBlocks => {
    const rows = [];
    for (const block of colBlocks) {
      rows.push({ type:'hdr', store: block.store });
      for (const it of block.items) rows.push({ type:'item', ...it });
    }
    return rows;
  });

  const maxLen = Math.max(...flatCols.map(c=>c.length));
  const data = [];
  data.push([`LISTA DE COMPRAS   ${dateVal}`,'','','','','','','','','','','','','','',`TOTAL: ${fmt(total)} Gs.`,'']);
  data.push(['☐=comprado','','','','☐=recibido','','','','','','','','','','','','']);
  data.push([]);

  for (let r = 0; r < maxLen; r++) {
    const row = [];
    for (let c = 0; c < 3; c++) {
      const ln = flatCols[c] ? flatCols[c][r] : null;
      if (!ln) { row.push('','','','',''); }
      else if (ln.type === 'hdr') { row.push('','','▶ '+ln.store,'',''); }
      else { row.push('☐', ln.num, ln.name, ln.qtyStr, '☐'); }
      if (c < 2) row.push('');
    }
    data.push(row);
  }

  const ws = XLSX.utils.aoa_to_sheet(data);
  ws['!cols'] = [
    {wch:3},{wch:3},{wch:23},{wch:9},{wch:3},
    {wch:1.5},
    {wch:3},{wch:3},{wch:23},{wch:9},{wch:3},
    {wch:1.5},
    {wch:3},{wch:3},{wch:23},{wch:9},{wch:3},
  ];
  ws['!pageSetup'] = { orientation: 'landscape', paperSize: 9, fitToPage: true, fitToWidth: 1, fitToHeight: 1 };
  ws['!margins'] = { left:0.3, right:0.3, top:0.4, bottom:0.4, header:0.2, footer:0.2 };
  XLSX.utils.book_append_sheet(wb, ws, 'Lista de Compras');
  XLSX.writeFile(wb, `lista_compras_${dateVal.replace(/-/g,'')}.xlsx`);
}

  window.print();

function renderStats() {
  const grid = document.getElementById('statsGrid');
  if (!history.length) { grid.innerHTML = ''; return; }
  const totals = history.map(h=>h.total);
  const avg = Math.round(totals.reduce((a,b)=>a+b,0)/totals.length);
  const max = Math.max(...totals);
  const min = Math.min(...totals);
  grid.innerHTML = `
    <div class="stat-card"><div class="stat-label">Compras registradas</div><div class="stat-value">${history.length}</div><div class="stat-sub">total</div></div>
    <div class="stat-card"><div class="stat-label">Promedio semanal</div><div class="stat-value">₲${fmtK(avg)}</div></div>
    <div class="stat-card"><div class="stat-label">Semana más alta</div><div class="stat-value">₲${fmtK(max)}</div><div class="stat-sub">${history.find(h=>h.total===max)?.date||''}</div></div>
    <div class="stat-card"><div class="stat-label">Semana más baja</div><div class="stat-value">₲${fmtK(min)}</div><div class="stat-sub">${history.find(h=>h.total===min)?.date||''}</div></div>`;
}

function renderWeeklyChart() {
  const el = document.getElementById('weeklyChart');
  if (!history.length) { el.innerHTML = '<div class="empty"><div class="empty-icon">📊</div><div class="empty-text">Sin datos todavía</div></div>'; return; }
  const recent = [...history].reverse().slice(-10);
  const maxVal = Math.max(...recent.map(h=>h.total));
  let html = '';
  for (const h of recent) {
    const pct = Math.max(12, Math.round((h.total/maxVal)*100));
    html += `<div class="bar-row"><div class="bar-label">${h.date}</div><div class="bar-track"><div class="bar-fill" style="width:${pct}%"><span class="bar-val">₲${fmtK(h.total)}</span></div></div></div>`;
  }
  el.innerHTML = html;
}

function renderWeeklyHistTable() {
  const tbody = document.getElementById('weeklyHistBody');
  if (!history.length) {
    tbody.innerHTML = '<tr><td colspan="7" style="text-align:center;padding:32px;color:var(--text3)">Sin registros. Use "Completar" en la Lista Semanal.</td></tr>';
    return;
  }
  tbody.innerHTML = history.map((h,i) => `
    <tr>
      <td><strong>${h.date}</strong></td>
      <td>₲ ${fmt(h.totals['MEGA']||0)}</td>
      <td>₲ ${fmt(h.totals['Verduras']||h.totals['야채/식재']||0)}</td>
      <td>₲ ${fmt(h.totals['Embalaje/Bebidas']||h.totals['포장/음료']||0)}</td>
      <td>₲ ${fmt(h.totals['Otros']||h.totals['기타']||0)}</td>
      <td class="week-total">₲ ${fmt(h.total)}</td>
      <td><button class="btn btn-outline btn-sm" style="color:var(--red)" onclick="deleteHistory(${i})">Eliminar</button></td>
    </tr>`).join('');
}

function deleteHistory(idx) {
  showModal('Eliminar registro',
    `<p style="color:var(--text2);font-size:14px">¿Eliminar el registro del ${history[idx].date}?</p>`,
    [
      {label:'Cancelar', cls:'btn-outline', fn: closeModal},
      {label:'Eliminar', cls:'btn-red', fn: ()=>{ history.splice(idx,1); saveState(); renderHistory(); closeModal(); showToast('Eliminado'); }}
    ]);
}

function renderPriceHistory() {
  const q = (document.getElementById('priceSearchInput')?.value || '').toLowerCase();
  const tbody = document.getElementById('priceHistBody');
  if (!history.length) { tbody.innerHTML = '<tr><td colspan="7" style="text-align:center;padding:24px;color:var(--text3)">Sin datos</td></tr>'; return; }

  const itemMap = {};
  for (const h of [...history].reverse()) {
    for (const it of h.items) {
      const key = it.store + '|' + it.name;
      if (!itemMap[key]) itemMap[key] = { store: it.store, name: it.name, prices: [] };
      itemMap[key].prices.push(it.price);
    }
  }
  let rows = Object.values(itemMap);
  if (q) rows = rows.filter(r => r.name.toLowerCase().includes(q) || r.store.toLowerCase().includes(q));
  rows.sort((a,b) => a.store.localeCompare(b.store) || a.name.localeCompare(b.name));

  tbody.innerHTML = rows.map(r => {
    const prices = r.prices;
    const latest = prices[prices.length-1];
    const prev = prices.length > 1 ? prices[prices.length-2] : null;
    const diff = prev !== null ? latest - prev : 0;
    const diffHtml = prev !== null
      ? (diff === 0 ? '<span class="price-same">=</span>'
        : `<span class="${diff>0?'price-up':'price-down'}">${diff>0?'▲':'▼'} ₲${fmt(Math.abs(diff))}</span>`)
      : '<span class="price-same">—</span>';
    return `<tr>
      <td><strong>${r.name}</strong></td>
      <td style="color:${getStoreColor(r.store)};font-weight:600;font-size:12px">${r.store}</td>
      <td>₲ ${fmt(latest)}</td>
      <td>${diffHtml}</td>
      <td>₲ ${fmt(Math.min(...prices))}</td>
      <td>₲ ${fmt(Math.max(...prices))}</td>
      <td>${prices.length}</td>
    </tr>`;
  }).join('') || '<tr><td colspan="7" style="text-align:center;padding:24px;color:var(--text3)">Sin resultados</td></tr>';
}

function exportHistoryExcel() {
  if (!history.length) { showToast('Sin datos para exportar'); return; }
  const wb = XLSX.utils.book_new();
  const sum = [['Fecha','MEGA','Verduras','Embalaje/Bebidas','Otros','Total']];
  for (const h of [...history].reverse()) {
    sum.push([h.date, h.totals['MEGA']||0, h.totals['Verduras']||h.totals['야채/식재']||0,
              h.totals['Embalaje/Bebidas']||h.totals['포장/음료']||0, h.totals['Otros']||h.totals['기타']||0, h.total]);
  }
  XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(sum), 'Resumen semanal');

  const detail = [['Fecha','Proveedor','Producto','Unidad','Cantidad','Precio','Subtotal']];
  for (const h of [...history].reverse()) {
    for (const it of h.items) detail.push([h.date, it.store, it.name, it.unit, it.qty, it.price, it.qty*it.price]);
  }
  XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(detail), 'Detalle por producto');
  XLSX.writeFile(wb, `historial_compras_${today()}.xlsx`);
}

// ════════════════════════════════════════════════════════════
//  PAGE 3 — Productos (개선된 관리)
// ════════════════════════════════════════════════════════════
function renderMaster() {
  const q = (document.getElementById('prodSearch')?.value || '').toLowerCase();
  const container = document.getElementById('masterContent');
  container.innerHTML = '';
  for (const store of getStores()) {
    if (!master[store]) continue;
    let items = master[store].map((p,i)=>({...p, _idx:i}));
    if (q) items = items.filter(p => p.name.toLowerCase().includes(q));
    if (q && !items.length) continue;
    const color = getStoreColor(store);
    const div = document.createElement('div');
    div.className = 'card';
    div.innerHTML = `
      <div class="card-head" style="background:${color};border-bottom:none">
        <div class="card-title" style="color:white">${store} <span style="opacity:0.7;font-weight:400">(${master[store].length})</span></div>
        <div style="display:flex;gap:8px">
          <button class="btn btn-ghost btn-sm" onclick="openAddModal('${store}')">＋ Agregar</button>
          ${!DEFAULT_STORES.includes(store) ? `<button class="btn btn-ghost btn-sm" style="opacity:0.75" onclick="deleteStore('${store}')">🗑 Eliminar tienda</button>` : ''}
        </div>
      </div>
      <div style="overflow-x:auto">
        <table class="master-table">
          <thead><tr><th style="width:30%">Producto</th><th>Unidad</th><th>Cant. habitual</th><th>Precio (₲)</th><th>Nota</th><th style="width:140px"></th></tr></thead>
          <tbody>
            ${items.map(p => `
              <tr>
                <td><strong>${p.name}</strong></td>
                <td>${p.unit}</td>
                <td>${p.qty}</td>
                <td>₲ ${fmt(p.price)}</td>
                <td style="font-size:12px;color:var(--text3)">${p.note||''}</td>
                <td>
                  <div class="prod-row-actions">
                    <button class="icon-btn" title="Subir" ${p._idx===0?'disabled':''} onclick="moveItem('${store}',${p._idx},-1)">↑</button>
                    <button class="icon-btn" title="Bajar" ${p._idx===items[items.length-1]._idx?'disabled':''} onclick="moveItem('${store}',${p._idx},+1)">↓</button>
                    <button class="icon-btn" title="Editar" onclick="openEditModal('${store}',${p._idx})">✏️</button>
                    <button class="icon-btn del" title="Eliminar" onclick="confirmDelete('${store}',${p._idx})">🗑</button>
                  </div>
                </td>
              </tr>`).join('')}
          </tbody>
        </table>
      </div>`;
    container.appendChild(div);
  }
  if (!container.innerHTML) {
    container.innerHTML = '<div class="empty"><div class="empty-icon">🔍</div><div class="empty-text">Sin resultados</div></div>';
  }
}

function productForm(p = {}, fixedStore = null) {
  const storeOptions = getStores().map(s =>
    `<option value="${s}" ${s===(fixedStore||p._store)?'selected':''}>${s}</option>`).join('');
  return `
    <div class="form-group">
      <label>Proveedor</label>
      <select class="form-select" id="f-store" ${fixedStore?'disabled':''}>${storeOptions}</select>
    </div>
    <div class="form-group">
      <label>Nombre del producto</label>
      <input class="form-input" id="f-name" value="${p.name||''}" placeholder="Ej: TOMATE">
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Unidad</label>
        <input class="form-input" id="f-unit" value="${p.unit||'UNI'}" placeholder="kg / CAJA / UNI">
      </div>
      <div class="form-group">
        <label>Cantidad habitual</label>
        <input class="form-input" id="f-qty" type="number" min="0" value="${p.qty??1}">
      </div>
    </div>
    <div class="form-group">
      <label>Precio (₲)</label>
      <input class="form-input" id="f-price" type="number" min="0" value="${p.price||0}">
    </div>
    <div class="form-group">
      <label>Nota (opcional)</label>
      <input class="form-input" id="f-note" value="${p.note||''}" placeholder="Ej: compra irregular">
    </div>`;
}

function openAddModal(store = null) {
  showModal('Agregar producto', productForm({}, store), [
    {label:'Cancelar', cls:'btn-outline', fn: closeModal},
    {label:'Agregar', cls:'btn-green', fn: () => {
      const s = store || document.getElementById('f-store').value;
      const name = document.getElementById('f-name').value.trim();
      if (!name) { showToast('⚠️ Ingrese el nombre'); return; }
      master[s] = master[s] || [];
      master[s].push({
        name,
        unit: document.getElementById('f-unit').value.trim() || 'UNI',
        qty: parseInt(document.getElementById('f-qty').value)||0,
        price: parseInt(document.getElementById('f-price').value)||0,
        note: document.getElementById('f-note').value.trim()
      });
      sortStore(s);
      saveState();
      initThisWeek();
      renderMaster();
      renderInput();
      closeModal();
      showToast('✅ Producto agregado');
    }}
  ]);
}

function openEditModal(store, idx) {
  const p = master[store][idx];
  showModal('Editar producto', productForm({...p, _store: store}, store), [
    {label:'Cancelar', cls:'btn-outline', fn: closeModal},
    {label:'Guardar', cls:'btn-green', fn: () => {
      const name = document.getElementById('f-name').value.trim();
      if (!name) { showToast('⚠️ Ingrese el nombre'); return; }
      master[store][idx] = {
        name,
        unit: document.getElementById('f-unit').value.trim() || 'UNI',
        qty: parseInt(document.getElementById('f-qty').value)||0,
        price: parseInt(document.getElementById('f-price').value)||0,
        note: document.getElementById('f-note').value.trim()
      };
      sortStore(store);
      saveState();
      initThisWeek();
      renderMaster();
      renderInput();
      closeModal();
      showToast('✅ Guardado');
    }}
  ]);
}

function confirmDelete(store, idx) {
  const p = master[store][idx];
  showModal('Eliminar producto',
    `<p style="color:var(--text2);font-size:14px">¿Eliminar <strong>"${p.name}"</strong> de ${store}?</p>`,
    [
      {label:'Cancelar', cls:'btn-outline', fn: closeModal},
      {label:'Eliminar', cls:'btn-red', fn: () => {
        master[store].splice(idx,1);
        saveState();
        initThisWeek();
        renderMaster();
        renderInput();
        closeModal();
        showToast('Eliminado');
      }}
    ]);
}


// 거래처 색상 — 없으면 이름 기반으로 자동 배정
const EXTRA_COLORS = ['#6B4C9A','#C0392B','#1A6B6B','#7D4E2D','#2471A3','#1E8449','#784212','#616A6B','#922B21','#1F618D'];
function getStoreColor(store) {
  if (STORE_COLORS[store]) return STORE_COLORS[store];
  // 이름 해시로 고정 색상 배정
  let hash = 0;
  for (const c of store) hash = (hash * 31 + c.charCodeAt(0)) % EXTRA_COLORS.length;
  return EXTRA_COLORS[Math.abs(hash)];
}
function openNewStoreModal() {
  showModal('Nueva tienda', `
    <div class="form-group">
      <label>Nombre de la tienda</label>
      <input class="form-input" id="f-storename" placeholder="Ej: ETC, FARMACIA, CARNICERIA..." style="width:100%">
    </div>`, [
    {label:'Cancelar', cls:'btn-outline', fn: closeModal},
    {label:'Crear tienda', cls:'btn-green', fn: () => {
      const name = document.getElementById('f-storename').value.trim().toUpperCase();
      if (!name) { showToast('⚠️ Ingrese el nombre'); return; }
      if (master[name]) { showToast('⚠️ Ya existe esta tienda'); return; }
      master[name] = [];
      saveState();
      renderMaster();
      renderInput();
      closeModal();
      showToast('🏪 Tienda creada: ' + name);
    }}
  ]);
  setTimeout(() => document.getElementById('f-storename')?.focus(), 100);
}

// ── 거래처 삭제 ──
function deleteStore(store) {
  if (master[store] && master[store].length > 0) {
    showToast('⚠️ Elimine todos los productos primero');
    return;
  }
  showModal('Eliminar tienda',
    `<p style="color:var(--text2);font-size:15px">¿Eliminar la tienda <strong>"${store}"</strong>?</p>`,
    [
      {label:'Cancelar', cls:'btn-outline', fn: closeModal},
      {label:'Eliminar', cls:'btn-red', fn: () => {
        delete master[store];
        saveState();
        initThisWeek();
        renderMaster();
        renderInput();
        closeModal();
        showToast('Tienda eliminada');
      }}
    ]);
}

// ── A→Z 정렬 ──
function sortStore(store) {
  if (master[store]) master[store].sort((a, b) => a.name.localeCompare(b.name));
}
function sortAllStores() {
  for (const store of getStores()) sortStore(store);
}

// ── 순서 이동 (↑↓) ──
function moveItem(store, idx, dir) {
  const arr = master[store];
  const newIdx = idx + dir;
  if (newIdx < 0 || newIdx >= arr.length) return;
  [arr[idx], arr[newIdx]] = [arr[newIdx], arr[idx]];
  saveState();
  initThisWeek();
  renderMaster();
  showToast(dir < 0 ? '↑ Movido arriba' : '↓ Movido abajo');
}

function exportMasterExcel() {
  const wb = XLSX.utils.book_new();
  const data = [['Proveedor','Producto','Unidad','Cant. habitual','Precio','Nota']];
  for (const store of getStores()) {
    if (!master[store]) continue;
    for (const p of master[store]) data.push([store, p.name, p.unit, p.qty, p.price, p.note||'']);
  }
  XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(data), 'Productos');
  XLSX.writeFile(wb, `productos_${today()}.xlsx`);
}

// ════════════════════════════════════════════════════════════
//  MODAL & TOAST & UTILS
// ════════════════════════════════════════════════════════════
function showModal(title, body, actions) {
  document.getElementById('modalTitle').textContent = title;
  document.getElementById('modalBody').innerHTML = body;
  const ac = document.getElementById('modalActions');
  ac.innerHTML = '';
  actions.forEach(a => {
    const btn = document.createElement('button');
    btn.className = 'btn ' + a.cls;
    btn.textContent = a.label;
    btn.onclick = a.fn;
    ac.appendChild(btn);
  });
  document.getElementById('modal').classList.add('open');
}
function closeModal() { document.getElementById('modal').classList.remove('open'); }

let toastTimer;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2200);
}

function storeKey(s) { return s.replace(/[\s]/g,'_'); }
function fmt(n) { return Number(n||0).toLocaleString('es-PY'); }
function fmtK(n) { return n>=1000000 ? (n/1000000).toFixed(1)+'M' : n>=1000 ? Math.round(n/1000)+'K' : String(n); }
function today() { return new Date().toISOString().slice(0,10).replace(/-/g,''); }

// ════════════════════════════════════════════════════════════
//  INIT
// ════════════════════════════════════════════════════════════
function init() {
  loadState();

    // 새 품목 추가 (2026-06-11 업데이트)
    const newItems = {
      'MEGA': [
        {name:'UVITA', unit:'UNI', qty:1, price:0, note:''},
        {name:'SIKA SALSA PICANTE', unit:'UNI', qty:1, price:0, note:''},
        {name:'MOSTAZA', unit:'UNI', qty:1, price:0, note:''},
      ],
      'MILU': [
        {name:'PLASTICO CUCHILLO', unit:'UNI', qty:2, price:0, note:'compra irregular'},
        {name:'PLASTICO TENEDOR', unit:'UNI', qty:1, price:0, note:'compra irregular'},
      ],
    };
    for (const [store, items] of Object.entries(newItems)) {
      if (!master[store]) master[store] = [];
      for (const ni of items) {
        if (!master[store].find(p => p.name === ni.name)) {
          master[store].push(ni);
        }
      }
    }
    saveState();
  // 초기 날짜: localStorage에 없으면 다음 목요일
  const savedDate = localStorage.getItem('mercadoThisWeekDate');
  if (!savedDate) {
    const d = new Date();
    const diff = (4 - d.getDay() + 7) % 7 || 7;
    d.setDate(d.getDate() + diff);
    document.getElementById('purchaseDate').value = d.toISOString().slice(0,10);
  }
  renderInput();
  document.getElementById('modal').addEventListener('click', e => { if(e.target===e.currentTarget) closeModal(); });
}
init();
</script>

<div id="installBanner" style="display:none;position:fixed;bottom:0;left:0;right:0;background:#1F4E79;color:white;padding:14px 20px 20px;z-index:999;box-shadow:0 -4px 20px rgba(0,0,0,0.3);text-align:center">
  <div style="font-size:13px;font-weight:700;margin-bottom:6px">📲 홈화면에 추가하면 앱처럼 사용할 수 있어요</div>
  <div style="font-size:12px;opacity:0.85;margin-bottom:12px">Safari 하단 <strong>공유 버튼 → 홈 화면에 추가</strong></div>
  <button onclick="document.getElementById('installBanner').style.display='none';localStorage.setItem('installDismissed','1')"
    style="background:rgba(255,255,255,0.2);border:1px solid rgba(255,255,255,0.4);color:white;padding:7px 20px;border-radius:20px;font-size:12px;font-weight:700;cursor:pointer">
    닫기
  </button>
</div>
<script>
// iOS Safari에서만, 홈화면 앱이 아닐 때, 한 번만 표시
(function() {
  const isIOS = /iphone|ipad|ipod/i.test(navigator.userAgent);
  const isSafari = /safari/i.test(navigator.userAgent) && !/chrome/i.test(navigator.userAgent);
  const isStandalone = window.navigator.standalone === true;
  const dismissed = localStorage.getItem('installDismissed');
  if (isIOS && isSafari && !isStandalone && !dismissed) {
    setTimeout(() => {
      document.getElementById('installBanner').style.display = 'block';
    }, 1500);
  }
})();
</script>
